name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-affiliate
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/tmag-affiliate
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest-staging

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/tmag-affiliate:latest-staging
          cache-to: type=inline

  deploy:
    name: Deploy affiliate to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - run: ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull & restart affiliate
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          GHCR_ORG: ${{ github.repository_owner }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh "$STAGING_USER@$STAGING_HOST" \
            DEPLOY_PATH="$STAGING_DEPLOY_PATH" \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_ORG="$GHCR_ORG" \
            GHCR_ACTOR="$GHCR_ACTOR" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
          cd "$DEPLOY_PATH"
          IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.staging.yml pull affiliate
          IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.staging.yml up -d --no-deps affiliate
          docker compose -f docker-compose.staging.yml ps affiliate
          REMOTE

  health-check:
    name: Health check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check affiliate (port 3010)
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "http://${{ secrets.STAGING_HOST }}:3010/" || echo "000")
            [[ "$status" == "200" ]] && { echo "OK (HTTP $status)"; exit 0; }
            echo "Retry $i/10 (HTTP $status)..."; sleep 6
          done
          echo "::error::Health check failed after 10 retries"
          exit 1
